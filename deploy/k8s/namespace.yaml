apiVersion: v1
kind: Namespace
metadata:
  name: tessera
  labels:
    app.kubernetes.io/name: tessera
    # Enforce the strictest Pod Security Standard on this namespace — the Deployment below
    # is authored to comply (non-root, no privilege escalation, all caps dropped, seccomp).
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
